<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SLP RUDA's AAC maker-ver.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding: 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 550px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; font-size: 24px; }
        .group { margin-bottom: 20px; padding: 15px; background: #fff; border: 1px solid #edf2f7; border-radius: 12px; }
        .radio-container { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
        .radio-group { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 15px; color: #4a5568; }
        select, input[type="number"], input[type="file"] { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        #file-list { margin-top: 15px; max-height: 280px; overflow-y: auto; }
        .file-item { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; background: #f8f9fa; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; }
        .file-info { font-size: 13px; font-weight: bold; color: #718096; }
        .file-info span { color: #1a73e8; margin-right: 5px; }
        .file-item input { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; }
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 2; padding: 16px; background: #1a73e8; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; }
        button:hover { background: #1557b0; }
        .btn-reset { flex: 1; background: #edf2f7; color: #4a5568; }
        .btn-reset:hover { background: #e2e8f0; }
        #status { margin-top: 20px; text-align: center; font-size: 14px; color: #718096; font-weight: 600; }
        .footer { margin-top: 35px; text-align: center; border-top: 1px solid #edf2f7; padding-top: 20px; }
        
        /* 💡 인스타그램 링크 스타일 설정 */
        .insta-link { color: #1a73e8; text-decoration: none; font-weight: bold; font-size: 14px; transition: color 0.2s; }
        .insta-link:hover { color: #1557b0; text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎨 루다쌤의 AAC maker ver.4.4</h2>
    
    <div class="group">
        <label>1. 정사각형 크기 (mm) [테두리 기준]</label>
        <select id="size">
            <option value="60">60mm</option>
            <option value="50">50mm</option>
            <option value="45" selected>45mm</option>
            <option value="40">40mm</option>
            <option value="30">30mm</option>
        </select>
    </div>

    <div class="group">
        <label>2. 제작 및 테두리 옵션</label>
        <div class="radio-container">
            <div class="radio-group">
                <input type="radio" id="borderImg" name="borderOption" style="width: 18px; height: 18px;">
                <span onclick="document.getElementById('borderImg').click()">그림 영역에만 테두리 넣기</span>
            </div>
            <div class="radio-group">
                <input type="radio" id="borderOuter" name="borderOption" checked style="width: 18px; height: 18px;">
                <span onclick="document.getElementById('borderOuter').click()">글자 포함 전체(외곽) 테두리 넣기</span>
            </div>
            <div class="radio-group">
                <input type="radio" id="borderNone" name="borderOption" style="width: 18px; height: 18px;">
                <span onclick="document.getElementById('borderNone').click()">테두리 선 없음</span>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 15px; margin-bottom: 12px;">
            <div style="flex: 1;">
                <label style="font-size: 13px;">테두리 색깔</label>
                <select id="borderColor">
                    <option value="black" selected>검정</option>
                    <option value="red">빨강</option>
                    <option value="orange">주황</option>
                    <option value="brown">갈색</option>
                    <option value="green">초록</option>
                    <option value="purple">보라</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label style="font-size: 13px;">테두리 굵기</label>
                <select id="borderWidth">
                    <option value="thin">얇게</option>
                    <option value="normal" selected>보통</option>
                    <option value="thick">두껍게</option>
                </select>
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label style="font-size: 13px;">글자 위치 스타일</label>
                <select id="textPos">
                    <option value="margin-bottom" selected>그림 여백 아래</option>
                    <option value="margin-top">그림 여백 위</option>
                    <option value="overlay-top">그림 겹치기 위</option>
                    <option value="overlay-bottom">그림 겹치기 아래</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label style="font-size: 13px;">글자 크기 (pt)</label>
                <input type="number" id="fontSize" value="14" min="8" max="40">
            </div>
        </div>
    </div>

    <div class="group">
        <label>3. 이미지 선택 및 단어 입력</label>
        <input type="file" id="images" accept="image/*" multiple onchange="updateFileList()">
        <div id="file-list"></div>
    </div>

    <div class="btn-container">
        <button onclick="generatePDF()">PDF 생성 및 저장</button>
        <button class="btn-reset" onclick="resetAll()">초기화</button>
    </div>
    <div id="status">파일을 선택하면 입력창이 나타납니다.</div>

    <div class="footer">
        <p style="font-size: 13px; color: #a0aec0; margin-bottom: 5px;">
            © 2026. SLP RUDA. All rights reserved.
        </p>
        <p>
            <a href="https://www.instagram.com/ruda_slp" target="_blank" class="insta-link">
                Instagram: @ruda_slp
            </a>
        </p>
    </div>
</div>

<script>
    function updateFileList() {
        const list = document.getElementById('file-list');
        const files = document.getElementById('images').files;
        list.innerHTML = "";
        
        if (files.length === 0) return;

        for (let i = 0; i < files.length; i++) {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerHTML = `
                <div class="file-info"><span>${i+1}</span>📁 파일명: ${files[i].name}</div>
                <input type="text" id="text-${i}" placeholder="이 그림에 매칭할 단어 입력">
            `;
            list.appendChild(div);
        }
        document.getElementById('status').innerText = `${files.length}개의 파일이 선택되었습니다.`;
    }

    function resetAll() {
        if(confirm("모든 데이터를 초기화할까요?")) {
            document.getElementById('images').value = "";
            document.getElementById('file-list').innerHTML = "";
            document.getElementById('status').innerText = "초기화되었습니다.";
        }
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const fileInput = document.getElementById('images');
        
        if (!fileInput.files || fileInput.files.length === 0) {
            alert("이미지를 먼저 선택해 주세요!");
            return;
        }

        const boxSize = parseInt(document.getElementById('size').value);
        const fontSize = parseInt(document.getElementById('fontSize').value);
        const textPos = document.getElementById('textPos').value;
        
        const useImgBorder = document.getElementById('borderImg').checked;
        const useOuterBorder = document.getElementById('borderOuter').checked;
        
        const borderColor = document.getElementById('borderColor').value;
        const borderWidthStr = document.getElementById('borderWidth').value;
        const status = document.getElementById('status');

        status.innerText = "PDF 생성 중...";
        const doc = new jsPDF('p', 'mm', 'a4');
        const margin = 15;
        const spacing = 8;
        
        const textSpace = (textPos.startsWith('margin')) ? (fontSize / 1.2) : 0;
        const imgSize = boxSize - textSpace;

        let currentX = margin;
        let currentY = margin;

        for (let i = 0; i < fileInput.files.length; i++) {
            const file = fileInput.files[i];
            const imgData = await readFileAsDataURL(file);
            const label = document.getElementById(`text-${i}`).value;
            
            let imgX = currentX;
            let imgY = currentY;
            
            if (textPos === 'margin-top') {
                imgY = currentY + textSpace;
                imgX = currentX + (textSpace / 2);
            } else if (textPos === 'margin-bottom') {
                imgX = currentX + (textSpace / 2);
            }
            
            const drawImgSize = textPos.startsWith('margin') ? imgSize : boxSize;
            doc.addImage(imgData, 'JPEG', imgX, imgY, drawImgSize, drawImgSize);
            
            if (label) {
                const isOverlay = textPos.startsWith('overlay');
                const textImg = await textToImage(label, fontSize, isOverlay);
                const textWidth = boxSize;
                const textHeight = (fontSize / 2.5);
                
                let textY;
                if (textPos === 'margin-top') textY = currentY + 0.5;
                else if (textPos === 'margin-bottom') textY = currentY + boxSize - textHeight - 0.5;
                else if (textPos === 'overlay-top') textY = currentY + 1.5;
                else if (textPos === 'overlay-bottom') textY = currentY + boxSize - textHeight - 1.5;
                
                doc.addImage(textImg, 'PNG', currentX, textY, textWidth, textHeight);
            }

            let ptWidth = 0.2; 
            if (borderWidthStr === 'normal') ptWidth = 0.6; 
            else if (borderWidthStr === 'thick') ptWidth = 1.2; 
            doc.setLineWidth(ptWidth);

            let r = 0, g = 0, b = 0; 
            if (borderColor === 'red') { r = 230; g = 57; b = 70; }
            else if (borderColor === 'orange') { r = 247; g = 127; b = 0; }
            else if (borderColor === 'brown') { r = 119; g = 73; b = 54; }
            else if (borderColor === 'green') { r = 42; g = 157; b = 143; }
            else if (borderColor === 'purple') { r = 114; g = 9; b = 183; }
            doc.setDrawColor(r, g, b);

            if (useImgBorder) {
                doc.rect(imgX, imgY, drawImgSize, drawImgSize);
            }
            if (useOuterBorder) {
                doc.rect(currentX, currentY, boxSize, boxSize);
            }
            
            currentX += boxSize + spacing;
            if (currentX + boxSize > 210 - margin) {
                currentX = margin;
                currentY += boxSize + spacing + 3;
            }
            if (currentY + boxSize + 10 > 297 - margin && i < fileInput.files.length - 1) {
                doc.addPage();
                currentX = margin;
                currentY = margin;
            }
        }

        doc.save(`루다쌤의 AAC maker_v4.4.pdf`);
        status.innerText = "저장 완료!";
    }

    function textToImage(text, size, isOverlay) {
        return new Promise((resolve) => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");
            const scale = 4;
            canvas.width = 400; 
            canvas.height = 80;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if(isOverlay) {
                ctx.fillStyle = "rgba(255,255,255,0.75)";
                ctx.fillRect(40, 10, 320, 60); 
            }
            
            ctx.fillStyle = "black";
            ctx.font = `bold ${size * scale}px sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            resolve(canvas.toDataURL("image/png"));
        });
    }

    function readFileAsDataURL(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsDataURL(file);
        });
    }
</script>
</body>
</html>
